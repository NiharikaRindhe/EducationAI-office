worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json application/javascript text/css;

  # ── Rate limiting zones ─────────────────────────────────────
  # API — per client IP, 60 requests/second burst
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

  # AI endpoints — per client IP, 5 requests/second (throttle chat/grading)
  limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/s;

  # ── Upstream services ───────────────────────────────────────
  upstream api_backend {
    server api:3001;
    keepalive 16;
  }

  upstream supabase_backend {
    server kong:8000;
    keepalive 8;
  }

  # ── HTTP → HTTPS redirect (production) ─────────────────────
  server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ───────────────────────────────────────
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static frontend (React / Vite build) ──────────────────
    location / {
      root   /usr/share/nginx/html;
      index  index.html;
      try_files $uri $uri/ /index.html;  # SPA fallback
      expires 1d;
      add_header Cache-Control "public, max-age=86400";
    }

    # Cache static assets aggressively (content-hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
      root    /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ── EduAI Node API ─────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=120 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      client_max_body_size 150m;    # Match NCERT PDF upload limit (api/routes/superAdmin.routes.ts)
      proxy_read_timeout   120s;    # Allow time for ingestion pipeline
    }

    # Apply tighter rate limit to AI/LLM endpoints
    location ~ ^/api/(teacher|student)/ai {
      limit_req zone=ai burst=10 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 180s;
    }

    # ── Supabase REST / Auth / Realtime / Storage ──────────────
    location /supabase/ {
      rewrite ^/supabase/(.*) /$1 break;
      proxy_pass         http://supabase_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      client_max_body_size 150m;
    }
  }
}
